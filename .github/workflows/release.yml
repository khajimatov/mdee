# OpenCode-style artifacts: mdee-{mac|linux}-{arm64|x86_64}.tar.gz at repo root in tarball.
name: release

on:
  push:
    tags:
      - "v*"

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            os: mac
            arch: arm64
          # Intel macOS (OpenCode-style x86_64 tarball); not macos-13 (retired).
          - runner: macos-15-intel
            os: mac
            arch: x86_64
          - runner: ubuntu-latest
            os: linux
            arch: x86_64
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile binary
        run: bun build --compile ./src/index.ts --outfile mdee

      - name: Package tarball
        run: tar czvf "mdee-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" mdee

      - uses: actions/upload-artifact@v4
        with:
          name: mdee-${{ matrix.os }}-${{ matrix.arch }}
          path: mdee-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: mdee-*
          merge-multiple: true
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
