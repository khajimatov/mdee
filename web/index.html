<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mdee — markdown in the terminal</title>
    <meta
      name="description"
      content="A small terminal UI for reading and editing Markdown files. Built with Bun and OpenTUI."
    />
    <link rel="canonical" href="https://mdee.bkh.dev/" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --surface: #ececec;
        --border: #30363d;
        --text: #000000;
        --text-muted: #565e67;
        --surface-label: #3d444c;
        --link: #0550ae;
        --focus: #0550ae;
        --copied-border: #116329;
        --ease-out-cubic: cubic-bezier(0.215, 0.61, 0.355, 1);
        --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d1117;
          --surface: #161b22;
          --border: #30363d;
          --text: #e6edf3;
          --text-muted: #8b949e;
          --surface-label: #9da5b4;
          --link: #79c0ff;
          --focus: #79c0ff;
          --copied-border: #3fb950;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem;
      }

      main {
        width: 100%;
        max-width: 40rem;
      }

      h1 {
        font-size: clamp(1.75rem, 4vw, 2.25rem);
        font-weight: 600;
        letter-spacing: -0.02em;
        margin: 0 0 0.5rem;
      }

      .hero-shot {
        display: block;
        width: 100%;
        height: auto;
      }

      .tagline {
        color: var(--text-muted);
        font-size: 1.05rem;
        margin: 0;
      }

      .panel {
        background: var(--surface);
        padding: 1rem 1.1rem;
        border-radius: 10px;
      }

      .panel h2 {
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--surface-label);
        margin-top: 0;
      }

      pre,
      code {
        font-family: var(--mono);
        font-size: 0.8125rem;
      }

      .install-row {
        display: flex;
        align-items: center;
        gap: 0.65rem;
      }

      .install-row pre {
        flex: 1;
        min-width: 0;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-all;
        line-height: 1.45;
      }

      .copy-install {
        flex-shrink: 0;
        margin: 0;
        position: relative;
        padding: 0 0.65rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-family: var(--sans);
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--text);
        background: transparent;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        cursor: pointer;
        line-height: 2;
        --copy-install-dur: 150ms;
        transition:
          color var(--copy-install-dur) ease,
          border-color var(--copy-install-dur) ease,
          transform var(--copy-install-dur) var(--ease-out-cubic);
      }

      .copy-install::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 44px;
        min-width: 100%;
        height: 44px;
        min-height: 100%;
        box-sizing: border-box;
      }

      .copy-install:active {
        transform: scale(0.97);
      }

      .copy-install:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
      }

      .copy-install.copied {
        color: var(--text);
        border-color: var(--copied-border);
      }

      a {
        color: var(--link);
        text-decoration: none;
      }

      a:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
        border-radius: 2px;
      }

      @media (hover: hover) and (pointer: fine) {
        a:hover {
          text-decoration: underline;
        }

        .copy-install:hover {
          color: var(--link);
          border-color: var(--link);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .copy-install {
          transition: none;
        }

        .copy-install:active {
          transform: none;
        }
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .links {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>mdee</h1>
      <p class="tagline">Markdown in the terminal — view and edit .md files</p>
      <img
        class="hero-shot"
        src="mdee.png"
        width="2560"
        height="1440"
        alt="mdee running in the terminal with a markdown file open"
      />

      <div class="panel">
        <h2>Install</h2>
        <div class="install-row">
          <pre id="install-cmd">curl -fsSL https://mdee.bkh.dev/install | bash</pre>
          <button
            type="button"
            class="copy-install"
            id="copy-install-btn"
            aria-label="Copy install command"
          >
            Copy
          </button>
        </div>
        <p id="copy-announce" class="visually-hidden" aria-live="polite" aria-atomic="true"></p>
      </div>

      <div class="links">
        <a href="https://github.com/khajimatov/mdee">GitHub</a>
      </div>
    </main>
    <script>
      (function () {
        var pre = document.getElementById("install-cmd");
        var copyBtn = document.getElementById("copy-install-btn");
        var copyAnnounce = document.getElementById("copy-announce");
        var canonical = "curl -fsSL https://mdee.bkh.dev/install | bash";
        if (!pre) return;
        if (location.protocol === "https:") {
          pre.textContent = "curl -fsSL " + location.origin + "/install | bash";
        } else {
          pre.textContent = canonical;
        }

        if (!copyBtn) return;

        var copyLabel = copyBtn.textContent.trim();
        var copyAriaDefault = copyBtn.getAttribute("aria-label") || "Copy install command";
        var resetTimer;

        function fallbackCopy(text) {
          var ta = document.createElement("textarea");
          ta.value = text;
          ta.setAttribute("readonly", "");
          ta.style.position = "fixed";
          ta.style.left = "-9999px";
          document.body.appendChild(ta);
          ta.select();
          try {
            document.execCommand("copy");
          } catch (e) {}
          document.body.removeChild(ta);
        }

        function showCopied() {
          copyBtn.textContent = "Copied";
          copyBtn.classList.add("copied");
          copyBtn.setAttribute("aria-label", "Copied to clipboard");
          if (copyAnnounce) {
            copyAnnounce.textContent = "";
            requestAnimationFrame(function () {
              copyAnnounce.textContent = "Install command copied to clipboard.";
            });
          }
          clearTimeout(resetTimer);
          resetTimer = setTimeout(function () {
            copyBtn.textContent = copyLabel;
            copyBtn.classList.remove("copied");
            copyBtn.setAttribute("aria-label", copyAriaDefault);
            if (copyAnnounce) copyAnnounce.textContent = "";
          }, 1500);
        }

        copyBtn.addEventListener("click", function () {
          var text = pre.textContent;
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(showCopied).catch(function () {
              fallbackCopy(text);
              showCopied();
            });
          } else {
            fallbackCopy(text);
            showCopied();
          }
        });
      })();
    </script>
  </body>
</html>
